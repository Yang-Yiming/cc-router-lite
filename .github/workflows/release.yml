name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos-arm:
    name: Build macOS ARM
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf ccrl-aarch64-apple-darwin.tar.gz ccrl
          shasum -a 256 ccrl-aarch64-apple-darwin.tar.gz > ccrl-aarch64-apple-darwin.tar.gz.sha256

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/aarch64-apple-darwin/release/ccrl-aarch64-apple-darwin.tar.gz
            target/aarch64-apple-darwin/release/ccrl-aarch64-apple-darwin.tar.gz.sha256
